[cable_types]

# This is a test cable and has weirdnesses. Do not use as a library reference
# only defining required values
[cable_types.triax_rg11]
cross_sect_area = {value = [137, 1], original_unit="square millimeter"}
cross_section = "Circular"
cable_type_code = "RG11"

[cable_types.triax_rg11.cores]

# This could also have been defined as an insulated wire
[cable_types.triax_rg11.cores.inner]
WireType = "triax_15awg_copper_inner"

[[cable_types.triax_rg11.layers]]
layer_number = 1
layer_type = "Insulation"
thickness = {value = [31, 250], original_unit = "inch"}
material = "High Density Polyethylene Foam"
color = "White"

[[cable_types.triax_rg11.layers]]
layer_number = 2
layer_type = "Shield"
material = "Bare Copper"

[[cable_types.triax_rg11.layers]]
layer_number = 3
layer_type = "Jacket"
thickness = {value = [79, 1000], original_unit = "inch"}
material = "Polyethylene"
color = "Black"

[[cable_types.triax_rg11.layers]]
layer_number = 4
layer_type = "Shield"
material = "Bare Copper"

[[cable_types.triax_rg11.layers]]
layer_number = 5
layer_type = "Jacket"
thickness = {value = [13, 25], original_unit = "inch"}
material = "Polyvinyl Chloride"
color = "Yellow"
